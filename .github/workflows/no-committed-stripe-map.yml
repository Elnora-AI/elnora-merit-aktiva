name: No Committed Stripe Map

# Fails if a populated Stripe→Merit reconcile config (real account codes + VAT TaxId) or
# the idempotency ledger is ever committed. Those hold company-specific data and must
# stay in the user's private ~/.config/elnora-merit/ (gitignored). See
# scripts/check-no-committed-stripe-map.mjs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: no-committed-stripe-map-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check no populated reconcile config is committed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: node scripts/check-no-committed-stripe-map.mjs
