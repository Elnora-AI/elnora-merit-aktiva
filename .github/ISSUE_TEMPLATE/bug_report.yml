name: Bug Report
description: Report a bug in elnora-merit-aktiva
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: CLI Version
      description: "Run `elnora-merit --version` to find your version."
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: "Run `node --version` to find your version."
      placeholder: "v20.10.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did you hit this?
      options:
        - Claude Code (slash command or agent)
        - Standalone CLI (elnora-merit)
        - Both
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Run `elnora-merit accounts list`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Any relevant error messages or logs.
        **Important:** Please redact any API keys, signatures, company data, invoice numbers, or personal data before pasting.
      render: shell
    validations:
      required: false
